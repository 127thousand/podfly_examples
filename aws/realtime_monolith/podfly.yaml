# AWS App Runner MONOLITH: Flutter web + Serverpod API
# HTTP RPC works; WebSockets do NOT (managed Envoy 403) — use aws/ecs_realtime for streams.

host: aws
mode: monolith
name: aws_rt
server: aws_rt_server
flutter: aws_rt_flutter

aws:
  service: podfly-aws-realtime
  region: us-east-1
  cpu: "1024"
  memory: "2048"
  port: 8080
  ecr_access_role: AppRunnerECRAccessRole
  platform: linux/amd64
  start_command: /app/start.sh
  ecr_public: true

database:
  provider: none

web:
  enabled: true
  api_url: https://placeholder.awsapprunner.com/
  server_url_define: SERVER_URL
  patch_bootstrap: true
  write_headers: true
  base_href: /

smoke:
  api:
    method: POST
    path: /greeting/hello
    body: '{"name":"aws-rt"}'
    expect_status: 200
  web:
    path: /
    expect_status: 200
