# AWS ECS Fargate + ALB monolith — Flutter web + Serverpod + WebSockets
# Same container as App Runner realtime_monolith; ALB supports WS upgrades.
# No CDK — podfly orchestrates the aws CLI.

host: aws_ecs
mode: monolith
name: aws_ecs_rt
server: aws_rt_server
flutter: aws_rt_flutter

aws_ecs:
  service: podfly-ecs-rt
  region: us-east-1
  cluster: podfly-ecs-rt
  cpu: "512"
  memory: "1024"
  port: 8080
  desired_count: 1
  idle_timeout_seconds: 3600
  stickiness: true
  assign_public_ip: true
  platform: linux/amd64
  log_group: /ecs/podfly-ecs-rt
  execution_role: podflyEcsTaskExecutionRole
  # After deploy, podfly fills: public_host, load_balancer_arn, target_group_arn

database:
  provider: none

web:
  enabled: true
  api_url: http://placeholder.elb.amazonaws.com/
  server_url_define: SERVER_URL
  patch_bootstrap: true
  write_headers: true
  base_href: /

smoke:
  api:
    method: POST
    path: /greeting/hello
    body: '{"name":"ecs"}'
    expect_status: 200
  web:
    path: /
    expect_status: 200
