# Fly.io — Serverpod API only (scale to zero).
# Change `app` to a unique name (must match podfly.yaml fly.app).

app = "podfly-api-only-demo"
primary_region = "iad"

[build]
  dockerfile = "mobile_api_only_server/Dockerfile"

[env]
  runmode = "production"
  SERVERPOD_RUN_MODE = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
  cpus = 1
