# Fly API (+ WebSockets) + Vercel Flutter web — split realtime
#   podfly deploy --yes --smoke

host: fly
web_host: vercel
mode: split
name: vercel_rt
server: vercel_rt_server
flutter: vercel_rt_flutter

fly:
  app: podfly-vercel-rt-api
  region: iad
  config: fly.toml
  scale_to_zero: true
  ha: false

vercel:
  project: podfly-vercel-rt-ui

database:
  provider: none

web:
  enabled: true
  server_url_define: SERVER_URL
  # Flutter client (RPC + streams) targets Fly, not the Vercel origin
  api_url: https://podfly-vercel-rt-api.fly.dev/
  patch_bootstrap: true
  write_headers: true
  base_href: /

smoke:
  api:
    method: POST
    path: /greeting/hello
    body: '{"name":"vercel-rt"}'
    expect_status: 200
  web:
    path: /
    expect_status: 200
