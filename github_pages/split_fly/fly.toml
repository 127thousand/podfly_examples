# Fly.io — Serverpod API (scale to zero). Match podfly.yaml fly.app.

app = "podfly-gpages-api"
primary_region = "iad"

[build]
  dockerfile = "ghp_split_server/Dockerfile"

[env]
  runmode = "production"
  SERVERPOD_RUN_MODE = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
  cpus = 1
