# Generated by podfly — edit freely
host: fly  # API cloud: fly | railway | render | …
web_host: netlify  # Flutter static CDN: cloudflare | vercel | netlify | github_pages
mode: split
name: notes
server: notes_server
flutter: notes_flutter

fly:
  app: podfly-supabase-notes-api
  region: iad
  config: fly.toml
  scale_to_zero: false
  ha: false

netlify:
  site: podfly-supabase-notes-ui

database:
  provider: supabase
  supabase:
    project_name: podfly-supabase-notes
    region: us-east-1
    provision: true
    # Default true: session pooler (IPv4). Direct db.<ref> is often IPv6-only
    # and hangs note/list (and other DB endpoints) from Fly.
    use_pooler: true
    database: postgres
    user: postgres
    port: 5432

web:
  enabled: true
  server_url_define: SERVER_URL
  api_url: https://podfly-supabase-notes-api.fly.dev/
  patch_bootstrap: true
  write_headers: true
  base_href: /

smoke:
  api:
    method: POST
    path: /greeting/hello
    body: "{\"name\":\"supabase\"}"
    expect_status: 200
  web:
    path: /
    expect_status: 200
