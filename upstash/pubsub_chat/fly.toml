# Fly.io — Serverpod API (HA for multi-instance PubSub demo)
app = "podfly-upstash-chat-api"
primary_region = "iad"

[build]
  dockerfile = "chat_server/Dockerfile"

[env]
  runmode = "production"
  SERVERPOD_RUN_MODE = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
  cpus = 1
