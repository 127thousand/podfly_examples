# Railway: API service + native static web service + WebSocket streams
#   podfly deploy --yes --smoke

host: railway
mode: monolith
name: railway_rt
server: railway_rt_server
flutter: railway_rt_flutter

railway:
  project: podfly-railway-rt
  service: api
  web_service: web
  serverless: true
  enable_cdn: true

database:
  provider: none

web:
  enabled: true
  server_url_define: SERVER_URL
  # Filled after first API domain; flutter build bakes this in
  api_url: https://REPLACE.up.railway.app/
  patch_bootstrap: true
  write_headers: true
  base_href: /

smoke:
  api:
    method: POST
    path: /greeting/hello
    body: '{"name":"railway-rt"}'
    expect_status: 200
  web:
    path: /
    expect_status: 200
